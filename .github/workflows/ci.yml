name: Workflow CI - Sentiment Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install mlflow dagshub pandas numpy scikit-learn scipy matplotlib seaborn

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/ratihayudianurmala/Eksperimen_SML_Ran.mlflow
          MLFLOW_TRACKING_USERNAME: ratihayudianurmala
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          python modelling.py

      - name: Upload artifacts ke GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            MLProject/confusion_matrix.png
            MLProject/classification_report.txt

      - name: Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download model dari DagsHub
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/ratihayudianurmala/Eksperimen_SML_Ran.mlflow
          MLFLOW_TRACKING_USERNAME: ratihayudianurmala
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python download_model.py

      - name: Build dan Push Docker Image
        run: |
          mlflow models build-docker -m "./downloaded_model/model" -n "ran1609/sentiment-analysis-olist" --env-manager local
          docker push ran1609/sentiment-analysis-olist